---
layout: default
---
<article class="card post">
  <h1 class="post__title">{{ page.title }}</h1>
  <p class="post__meta">
    Zpracováno {{ page.date | date: "%d. %m. %Y" }}{% if page.original_date %} · původní článek z {{ page.original_date | date: "%d. %m. %Y" }}{% endif %}
    {% include verdict-badge.html post=page %}
  </p>
  <div class="post__content">
    {{ content }}
  </div>
  <p class="post__back"><a href="{{ '/' | relative_url }}">← Zpět na přehled</a></p>
</article>
