name: Daily BC Update
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          # Přidáme historii a případné nové posty
          git add history.json
          # Zkusíme přidat _posts, ale ignorujeme chybu, pokud tam nic není
          git add _posts/ || echo "Žádné nové příspěvky"
          # Commitneme pouze pokud existují nějaké změny
          git commit -m "Update daily digest" || echo "Žádné změny k commitnutí"
          git pull --rebase origin main
          git push origin main
