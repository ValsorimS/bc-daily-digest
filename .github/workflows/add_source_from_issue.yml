name: Add source from issue

on:
  issues:
    # opened: nové issue z formuláře; labeled: schválení/dozpracování přidáním labelu
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-source:
    # Spustí se jen pro issue z formuláře „Navrhnout zdroj"
    if: contains(github.event.issue.labels.*.name, 'navrhnout-zdroj')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse issue and add source
        id: add
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os, sys, subprocess

          body = os.environ.get("ISSUE_BODY", "") or ""

          # Issue formulář vykresluje pole jako "### <label>" + hodnota
          sections, cur, buf = {}, None, []
          for line in body.splitlines():
              if line.startswith("### "):
                  if cur is not None:
                      sections[cur] = "\n".join(buf).strip()
                  cur, buf = line[4:].strip(), []
              else:
                  buf.append(line)
          if cur is not None:
              sections[cur] = "\n".join(buf).strip()

          def clean(v):
              v = (v or "").strip()
              return "" if v == "_No response_" else v

          url = clean(sections.get("URL zdroje"))
          typ = clean(sections.get("Typ zdroje"))
          name = clean(sections.get("Název (nepovinné)"))

          def emit(key, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write(f"{key}<<__EOF__\n{value}\n__EOF__\n")

          if not url:
              emit("result", "Chybí URL zdroje – issue nešlo zpracovat.")
              sys.exit(1)

          cmd = [sys.executable, "add_source.py", url]
          if name:
              cmd += ["--name", name]
          if "YouTube" in typ or "youtube" in url.lower() or "youtu.be" in url.lower():
              cmd += ["--youtube"]

          res = subprocess.run(cmd, capture_output=True, text=True)
          out = (res.stdout + res.stderr).strip() or "(bez výstupu)"
          print(out)
          emit("result", out)
          sys.exit(res.returncode)
          PY

      - name: Create pull request
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESULT: ${{ steps.add.outputs.result }}
        run: |
          BRANCH="add-source/issue-${ISSUE_NUMBER}"
          # Pojistka proti dvojímu běhu (opened i labeled): když branch už
          # existuje, PR byl nejspíš založen dřív – nic nedělej.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH už existuje – přeskakuji."
            exit 0
          fi

          if [ -z "$(git status --porcelain sources.json)" ]; then
            COMMENT=$(printf 'Zdroj nebyl přidán:\n\n```\n%s\n```\n\nPravděpodobně už v `sources.json` existuje.' "$RESULT")
            gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "action@github.com"
          git checkout -b "$BRANCH"
          git add sources.json
          git commit -m "Přidat zdroj z issue #${ISSUE_NUMBER}"
          git push -u origin "$BRANCH"

          BODY=$(printf 'Automaticky vytvořeno z issue #%s.\n\n```\n%s\n```\n\nCloses #%s' \
            "$ISSUE_NUMBER" "$RESULT" "$ISSUE_NUMBER")
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "Přidat zdroj (issue #${ISSUE_NUMBER})" --body "$BODY")

          gh issue comment "$ISSUE_NUMBER" --body "Vytvořen pull request: ${PR_URL}"

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESULT: ${{ steps.add.outputs.result }}
        run: |
          COMMENT=$(printf 'Zdroj se nepodařilo přidat automaticky:\n\n```\n%s\n```\n\nZkontroluj prosím URL, případně přidej zdroj ručně.' "${RESULT:-Chyba při zpracování issue.}")
          gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
